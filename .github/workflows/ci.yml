name: Metal Strike Overdrive CI

on:
  push:
    branches: [master, "feat/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify and test
        id: verify
        shell: bash
        run: |
          set +e
          npm run check 2>&1 | tee overdrive-ci.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit $status
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overdrive-ci-log
          path: overdrive-ci.log
          if-no-files-found: error

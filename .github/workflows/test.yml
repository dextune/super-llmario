name: test-and-package

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  node-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify and test
        run: npm run check
      - name: Build source archive
        run: zip -r super-qwen-rpg2-source.zip . -x '.git/*' 'super-qwen-rpg2-source.zip'
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: super-qwen-rpg2-source
          path: super-qwen-rpg2-source.zip
          retention-days: 7
          if-no-files-found: error
